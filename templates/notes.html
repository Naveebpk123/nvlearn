{% extends "base.html" %}
{% block title %}Notes{% endblock %}

{% block content %}
<header>
    <h1>My Notes</h1>
</header>

<a class="button" href="{{url_for('add_note')}}">Add Note</a>
<div class="note-container">
    {% if notes %}
{% for note in notes %}
    <div class="note">
        <div class="note-title">{{note.title}}</div>
        <div class="note-preview">
            {{note.html_content | safe}}
        </div>
        <div class="action-buttons">
            <a href="{{url_for('edit_note',note_id=note.id)}}" class="button cancel">✎ Edit Note</a>
            <a href="{{url_for('move_to_bin',note_id=note.id)}}" class="button danger">Move to Bin 🗑️</a>
        </div>
    </div>
    {% endfor %}
{% else %}
<div class="note">
        <div class="note-title">No notes created yet</div>
    </div>
{% endif %}
</div>
{% endblock %}
