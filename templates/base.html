<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css')}}">
    <title>{% block title %}Study App{% endblock %}</title>
</head>
<body class="site-container">
    <nav>
        <a class="nav-link logo" href="{{ url_for('home') }}">The Study APP</a>
        <a class="nav-link" href="{{ url_for('home') }}">Home</a>
        <a class="nav-link" href="{{ url_for('notes') }}">Notes</a>
        <a class="nav-link" href="{{ url_for('about') }}">About</a>

    </nav>

    <main class="content-wrapper">
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy;2026 The Study App. Built for easy and effective note management and learning</p>
    </footer>
</body>
</html>
