<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">    
    <title>{% block title %}NVLearn{% endblock %}</title>
</head>
<body class="site-layout">
    <nav>
        <img src="{{url_for('static',filename='assets/logo.png')}}" alt="logo" class="logo" id="logo" title="Toggle sidebar">

        {% if current_user.is_authenticated %}
        <input type="text" placeholder="Search..." class="search-bar" id="searchBar">
        {% endif %}
    </nav>
<div class="page-layout">
    <aside class="sidebar" id="sidebar">

        <a class="sidebar-item" href="{{url_for('home')}}">
            🏠 Home
        </a>
        {% if current_user.is_authenticated %}
        <a class="sidebar-item" href="{{url_for('notes')}}">
            📚 Notes
        </a>

        <a class="sidebar-item" href="{{url_for('note_bin')}}">
            🗑️ Bin
        </a>
        <a class="sidebar-item" href="{{url_for('ai_chat')}}">
            ✨ NVLearn AI
        </a>
        <a class="sidebar-item" id="sidebarLogout" href="">
            ➜] Logout
        </a>
        {% else %}
        <a class="sidebar-item" href="{{url_for('register')}}">
            📝 Register
        </a>

        <a class="sidebar-item" href="{{url_for('login')}}">
            ➜] Login
        </a>
        {% endif %}
        <a class="sidebar-item" href="{{url_for('about')}}">
            ℹ️ About
        </a>
    </aside>
    <main class="content-wrapper sidebar-open" id="contentWrapper">
        <div id="notificationBar"></div>
        
        {% block content %}
        {% endblock %}
    </main>
</div>
<div class="modal-bg" id="modalBackground" style="display:none;">
<div class="confirm-modal" id="confirmModal">
    <p class="modal-text" id="modalText">yo</p>
    <div class="modal-btns">
        <a id="modalConfirmBtn" class="button" role="button">Confirm</a>
        <button id="modalCancelBtn" class="button cancel">Cancel</button>
    </div>
</div>
</div>
<div class="modal-bg" id="searchModalBackground" style="display:none;">
    <div class="search-modal" id="searchModal">
        <input name="search-input" class="search-bar" id="modalSearchBar" placeholder="Search notes">
        <div class="search-result-container" id="searchResultContainer">
            </div>
    </div>
</div>
<script src="{{url_for('static',filename='js/script.js')}}"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turndown@7.1.3/dist/turndown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> 
<script>
    document.addEventListener('DOMContentLoaded',function(){
        {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
          {% for category, message in messages %}
            flash('{{message}}','{{category}}');
          {% endfor %}
      {% endif %}
    {% endwith %}
    })
</script>  
<script>
    document.addEventListener("DOMContentLoaded", function() {        
    const textarea = document.getElementById('markdownEditor');
    if (!textarea) return; 

    const editorWrapper = document.createElement('div');
    editorWrapper.className = 'quill-editor-wrapper';
    textarea.parentNode.insertBefore(editorWrapper, textarea);

    const quillContainer = document.createElement('div');
    editorWrapper.appendChild(quillContainer);
    textarea.style.display = 'none'; 

    const themeOptions = {
        modules: {
            toolbar: {
                container: [
                    ['bold', 'italic', 'underline'],
                    [{ 'header': 1 }, { 'header': 2 }],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean'],
                    ['fullscreen'],
                    ['readmode']
                ],
                handlers: {
                    'fullscreen': function() {
                        editorWrapper.classList.toggle('fullscreen-active');
                        document.body.classList.toggle('editor-lock-scroll');
                    },
                    'readmode': function() {
                        window.location.href = "{% if note %}{{url_for('read_note', note_id=note.id)}}{% else %}#{% endif %}";
                    }    
                }                    
            }
        },
        placeholder: 'Write your note here...',
        theme: 'snow'
    };
    const editor = new Quill(quillContainer, themeOptions);

    const readModeBtn = editorWrapper.querySelector('.ql-readmode');
    if (readModeBtn) {
        readModeBtn.innerHTML = `
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>`;
        readModeBtn.title = "Open Read Mode";
    }

    const fullscreenBtn = editorWrapper.querySelector('.ql-fullscreen');
    if (fullscreenBtn) {
        fullscreenBtn.innerHTML = `
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>`;
        fullscreenBtn.title = "Toggle Fullscreen Mode";
    }

    if (textarea.value) {
        const htmlFromMarkdown = marked.parse(textarea.value);
        editor.clipboard.dangerouslyPasteHTML(htmlFromMarkdown);
    }

    const turndownService = new TurndownService();
    textarea.form.addEventListener('submit', function() {
        const htmlContent = editor.getSemanticHTML(); 
        const markdownContent = turndownService.turndown(htmlContent); 

        textarea.value = markdownContent;

        let htmlHiddenInput = document.getElementById('htmlNoteContent');
        if (!htmlHiddenInput) {
            htmlHiddenInput = document.createElement('input');
            htmlHiddenInput.type = 'hidden';
            htmlHiddenInput.id = 'htmlNoteContent';
            htmlHiddenInput.name = 'html_content'; 
            textarea.form.appendChild(htmlHiddenInput);
        }
        htmlHiddenInput.value = htmlContent;
    });
});
</script>

</body>
</html>
